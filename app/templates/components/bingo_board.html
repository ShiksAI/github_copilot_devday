<div class="grid grid-cols-5 gap-2 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-2 text-center border-2 rounded-2xl transition-all duration-300 select-none min-h-[60px] text-xs leading-tight shadow-fun
        {%- if square.is_marked %}
            {%- if is_winning %} bg-winning border-winning-border text-gray-900 animate-sparkle
            {%- else %} bg-marked border-marked-border text-white animate-confetti
            {%- endif %}
        {%- else %} bg-white border-accent text-gray-900 hover:scale-105 hover:shadow-lg-fun
        {%- endif %}
        {%- if square.is_free_space %} font-bold text-sm bg-secondary text-white{% endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-0.5 right-0.5 text-white text-lg animate-bounce">✅</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
