<div id="game-container">
<div class="flex flex-col items-center justify-center min-h-full p-6 bg-gradient-fun">
    <div class="text-center max-w-sm">
        <h1 class="text-4xl font-bold text-gray-900 mb-2">🎉 Soc Ops 🎉</h1>
        <p class="text-lg text-secondary mb-8">Social Bingo</p>

        <div class="bg-white rounded-2xl p-6 shadow-fun border border-accent mb-8">
            <h2 class="font-semibold text-gray-900 mb-3">🤝 How to play</h2>
            <ul class="text-left text-gray-700 text-sm space-y-2">
                <li>• 👥 Find people who match the questions</li>
                <li>• 👆 Tap a square when you find a match</li>
                <li>• 🏆 Get 5 in a row to win!</li>
            </ul>
        </div>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-white font-semibold py-4 px-8 rounded-2xl text-lg shadow-fun hover:scale-105 transition-all duration-300 animate-pulse">
            🚀 Start Game 🚀
        </button>
    </div>
</div>
</div>
