<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-lg-fun animate-[bounce_0.5s_ease-out] relative overflow-hidden">
        <!-- Confetti background effect -->
        <div class="absolute inset-0 opacity-20">
            <div class="absolute top-4 left-4 text-4xl animate-confetti">🎊</div>
            <div class="absolute top-8 right-8 text-3xl animate-sparkle">✨</div>
            <div class="absolute bottom-4 left-8 text-2xl animate-bounce">🎉</div>
            <div class="absolute bottom-8 right-4 text-4xl animate-pulse">🏆</div>
        </div>
        <div class="relative z-10">
            <div class="text-6xl mb-4 animate-bounce">🎉</div>
            <h2 class="text-4xl font-bold text-accent mb-2 animate-pulse">BINGO!</h2>
            <p class="text-gray-700 mb-6 text-lg">You completed a line! 🎊</p>

            <button
                hx-post="/dismiss-modal"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="w-full bg-accent text-white font-bold py-4 px-8 rounded-2xl text-lg shadow-fun hover:scale-105 transition-all duration-300 animate-glow">
                🎮 Keep Playing! 🎮
            </button>
        </div>
    </div>
</div>
