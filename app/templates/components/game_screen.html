<div id="game-container">
<div class="flex flex-col min-h-full bg-gradient-fun">
    <!-- Header -->
    <header class="flex items-center justify-between p-3 bg-white/90 backdrop-blur-sm border-b border-accent shadow-fun">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-gray-700 text-sm px-3 py-1.5 rounded-2xl bg-gray-100 hover:bg-gray-200 transition-colors">
            ← Back
        </button>
        <h1 class="font-bold text-gray-900 text-xl">🎉 Soc Ops 🎉</h1>
        <div class="w-16"></div>
    </header>

    <!-- Instructions -->
    <p class="text-center text-secondary text-sm py-2 px-4 font-semibold">
        👆 Tap a square when you find someone who matches! 👆
    </p>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="bg-winning text-gray-900 text-center py-2 font-bold text-sm animate-glow rounded-2xl mx-4 shadow-fun">
        🎊 BINGO! You got a line! 🎊
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
